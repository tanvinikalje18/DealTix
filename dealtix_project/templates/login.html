<!DOCTYPE html>
<html>
<head>
    <title>DealTix</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-black text-white overflow-hidden">

<!-- Background Gradient -->
<div class="absolute w-full h-full bg-gradient-to-br from-purple-900 via-black to-indigo-900 animate-pulse"></div>

<!-- Glow Effects -->
<div class="absolute w-96 h-96 bg-pink-500 rounded-full blur-3xl opacity-30 top-10 left-10"></div>
<div class="absolute w-96 h-96 bg-blue-500 rounded-full blur-3xl opacity-30 bottom-10 right-10"></div>

<!-- Main Container -->
<div class="relative flex items-center justify-center h-screen">

    <div class="backdrop-blur-xl bg-white/10 p-10 rounded-2xl shadow-2xl w-96 transform hover:scale-105 transition duration-500">

        <h1 class="text-3xl font-bold mb-6 text-center tracking-wide">
            DealTix 🎟️
        </h1>

        <form class="space-y-4">
            <input type="text" placeholder="Username"
                class="w-full p-3 rounded-lg bg-white/20 focus:outline-none focus:ring-2 focus:ring-pink-500">

            <input type="password" placeholder="Password"
                class="w-full p-3 rounded-lg bg-white/20 focus:outline-none focus:ring-2 focus:ring-blue-500">

            <button class="w-full py-3 rounded-lg bg-gradient-to-r from-pink-500 to-purple-600 hover:scale-105 transition">
                Login
            </button>
        </form>

        <p class="text-sm mt-4 text-center opacity-80">
            New here? <span class="text-pink-400 cursor-pointer">Create account</span>
        </p>

    </div>

</div>

</body>
</html>
